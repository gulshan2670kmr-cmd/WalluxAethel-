<html lang="en">
<head>

    <title>Wallux Pro | Premium 4K Visual Assets & Wallpapers</title>
    <meta name="description" content="Download high-fidelity 4K wallpapers for mobile and desktop. Curated collection of minimal, nature, and abstract visual assets.">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Smooth Scrolling & Custom Selection */
        html { scroll-behavior: smooth; }
        ::selection { background: rgba(6, 182, 212, 0.3); color: white; }
        
        /* Outline Text Effect for Logo/Header */
        .outline-text {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.1);
            color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020203;
            margin: 0;
            overflow-x: hidden;
        }

        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020203; }
        ::-webkit-scrollbar-thumb { background: #1f1f23; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }
    </style>
</head>
