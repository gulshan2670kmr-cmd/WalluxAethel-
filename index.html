<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="google-site-verification" content="B4WwjSTxC4VR4yq55ef6HA6GhMOgMdsh84pt69lLCVA" />

    <link rel="icon" type="image/png" href="/favicon.png">

    <title>Asthexwall | Premium 4K Visual Assets</title>
    <meta name="description" content="Download high-fidelity 4K aesthetic wallpapers from Asthexwall for mobile and desktop.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <style>
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050508; /* Darker premium background */
            margin: 0; 
            color: #d4d4d8; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .outline-text { -webkit-text-stroke: 1px rgba(255, 255, 255, 0.1); color: transparent; }
        ::-webkit-scrollbar { width: 5px; }
        /* Scrollbar match with new Violet theme */
        ::-webkit-scrollbar-thumb { background: #1e1b4b; border-radius: 10px; }

        .reveal-init { opacity: 0; transform: translateY(20px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
        window.addEventListener('load', () => {
            if (window.gsap) {
                gsap.registerPlugin(ScrollTrigger);
                gsap.ticker.fps(60);

                setTimeout(() => {
                    
                    const heroTl = gsap.timeline();
                    heroTl.from("h1, h2", {
                        y: 60,
                        opacity: 0,
                        duration: 1.2,
                        stagger: 0.2,
                        ease: "power4.out"
                    });

                    gsap.utils.toArray('img').forEach((img) => {
                        gsap.from(img, {
                            scrollTrigger: {
                                trigger: img,
                                start: "top 90%",
                                toggleActions: "play none none none"
                            },
                            scale: 0.95,
                            opacity: 0,
                            duration: 1,
                            ease: "expo.out"
                        });
                    });

                    gsap.from("aside", {
                        x: -50,
                        opacity: 0,
                        duration: 1,
                        delay: 0.5,
                        ease: "power3.out"
                    });

                }, 1500);
            }
        });

        ScrollTrigger.config({ 
            ignoreMobileResize: true 
        });
    </script>
</body>
</html>
